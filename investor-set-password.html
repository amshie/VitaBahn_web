<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0B1013" />
<title>Set your password | VitaBahn</title>
<link rel="stylesheet" href="/assets/fonts.css" />
<style>
:root{--paper:#F7F8F6;--surface:#FFF;--ink:#0B1013;--ink-2:#203038;--ink-3:#5B6870;--teal:#4FB3A3;--teal-dark:#267F73;--teal-soft:#DFF2EE;--gold:#CBA968;--line:#DFE3E7;--sans:"IBM Plex Sans",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;--mono:"IBM Plex Mono",ui-monospace,Consolas,monospace}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;display:flex;flex-direction:column}
.railbar{height:3px;display:flex}.railbar span{display:block;height:100%}.railbar .a{flex:4;background:var(--teal)}.railbar .b{flex:3;background:#86B5A6}.railbar .c{flex:3;background:var(--gold)}
.mid{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:30px;width:min(440px,100%);box-shadow:0 14px 40px -18px rgba(11,16,19,.2)}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:18px}.brand b{font-size:17px;font-weight:600}.brand small{display:block;color:var(--ink-3);font-size:12px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal-dark);font-weight:600}
h1{font-size:22px;letter-spacing:-.02em;margin:6px 0 6px;font-weight:600}p.sub{color:var(--ink-3);font-size:13.5px;margin:0 0 20px}
label{display:block;font-size:13px;font-weight:600;margin:0 0 6px}
input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 13px;font:inherit;margin-bottom:14px}
input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(79,179,163,.18)}
button{width:100%;border:0;border-radius:10px;background:var(--teal-dark);color:#fff;padding:13px;font:inherit;font-weight:600;cursor:pointer}
button:hover:not(:disabled){background:#1F6C62}button:disabled{opacity:.5;cursor:not-allowed}
.hint{color:var(--ink-3);font-size:12px;margin:-8px 0 14px}
.status{display:none;margin-top:14px;padding:11px 13px;border-radius:10px;font-size:13.5px}
.status.error{display:block;background:#FCEBEA;border:1px solid #F1C9C6;color:#8A2C25}
.status.ok{display:block;background:var(--teal-soft);border:1px solid #A9DBD0;color:#1E5B52}
.foot{margin-top:18px;font-size:12.5px;color:var(--ink-3)}.foot a{color:var(--teal-dark)}
.hidden{display:none}
</style>
</head>
<body>
<div class="railbar" aria-hidden="true"><span class="a"></span><span class="b"></span><span class="c"></span></div>
<div class="mid">
  <div class="card">
    <div class="brand">
      <svg width="24" height="30" viewBox="0 0 123 152" aria-hidden="true"><g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"><path d="M38 34 V86 C38 98 46 100 46 111 C46 127 29 129 22 139 H14" stroke="#0D4D47"/><path d="M44 122 C40.5 126 38 130 37.5 136" stroke="#0D4D47" stroke-width="3.2"/><path d="M61.5 28 V140" stroke="#6D948C"/><path d="M85 34 V86 C85 98 77 100 77 111 C77 127 94 129 101 139 H109" stroke="#C8A86E"/><path d="M79 122 C82.5 126 85 130 85.5 136" stroke="#C8A86E" stroke-width="3.2"/></g><path d="M56 140 L67 140 L65 143.6 L58 143.6 Z" fill="#6D948C"/><circle cx="38" cy="26" r="7" fill="#0D4D47"/><circle cx="61.5" cy="20" r="7" fill="#6D948C"/><circle cx="85" cy="26" r="7" fill="#C8A86E"/><circle cx="50" cy="71" r="2.2" fill="#0D4D47"/><circle cx="50.4" cy="81" r="2.2" fill="#0D4D47"/><circle cx="50.8" cy="91" r="2.2" fill="#0D4D47"/><circle cx="51.2" cy="101" r="2.2" fill="#0D4D47"/><circle cx="51.6" cy="111" r="2.2" fill="#0D4D47"/><circle cx="33" cy="92" r="2.2" fill="#0D4D47"/><circle cx="33.6" cy="101" r="2.2" fill="#0D4D47"/><circle cx="34.2" cy="110" r="2.2" fill="#0D4D47"/><circle cx="34.8" cy="119" r="2.2" fill="#0D4D47"/><circle cx="73" cy="71" r="2.2" fill="#C8A86E"/><circle cx="72.6" cy="81" r="2.2" fill="#C8A86E"/><circle cx="72.2" cy="91" r="2.2" fill="#C8A86E"/><circle cx="71.8" cy="101" r="2.2" fill="#C8A86E"/><circle cx="71.4" cy="111" r="2.2" fill="#C8A86E"/><circle cx="90" cy="92" r="2.2" fill="#C8A86E"/><circle cx="89.4" cy="101" r="2.2" fill="#C8A86E"/><circle cx="88.8" cy="110" r="2.2" fill="#C8A86E"/><circle cx="88.2" cy="119" r="2.2" fill="#C8A86E"/></svg>
      <div><b>VitaBahn</b><small>Investor Data Room</small></div>
    </div>
    <div class="eyebrow">Account setup</div>
    <h1>Set your password</h1>
    <p class="sub" id="intro">Checking your link…</p>

    <form id="pwForm" class="hidden" novalidate>
      <label for="password">New password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" minlength="10" required />
      <div class="hint">At least 10 characters.</div>
      <label for="confirm">Confirm password</label>
      <input id="confirm" name="confirm" type="password" autocomplete="new-password" minlength="10" required />
      <button id="submitBtn" type="submit">Set password &amp; enter</button>
    </form>

    <div id="invalidBox" class="hidden">
      <p class="sub">This link is invalid, already used, or has expired.</p>
      <p class="foot">Please <a href="/investor-access">request access</a> again, or contact us to receive a new link.</p>
    </div>

    <div id="status" class="status" role="alert" aria-live="polite"></div>
    <p class="foot" id="loginLink">Already have a password? <a href="/investor-login">Investor login →</a></p>
  </div>
</div>
<script src="/assets/set-password.js"></script>
</body>
</html>
