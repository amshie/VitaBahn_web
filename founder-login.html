<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0B1013" />
<title>Founder Console Login | VitaBahn</title>
<link rel="stylesheet" href="/assets/fonts.css" />
<style>
:root{--paper:#F7F8F6;--surface:#FFF;--ink:#0B1013;--ink-2:#203038;--ink-3:#5B6870;--teal:#4FB3A3;--teal-dark:#267F73;--gold:#CBA968;--gold-soft:#F4EBD8;--gold-ink:#6E5423;--line:#DFE3E7;--sans:"IBM Plex Sans",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;--mono:"IBM Plex Mono",ui-monospace,Consolas,monospace}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;display:flex;flex-direction:column}
.railbar{height:3px;display:flex}.railbar span{display:block;height:100%}.railbar .a{flex:4;background:var(--teal)}.railbar .b{flex:3;background:#86B5A6}.railbar .c{flex:3;background:var(--gold)}
.mid{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:30px;width:min(420px,100%);box-shadow:0 14px 40px -18px rgba(11,16,19,.2)}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:18px}.brand b{font-size:17px;font-weight:600}.brand small{display:block;color:var(--ink-3);font-size:12px}
.pill{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;padding:5px 10px;border-radius:999px;background:var(--gold-soft);color:var(--gold-ink);border:1px solid rgba(203,169,104,.4);margin-bottom:12px}
h1{font-size:22px;letter-spacing:-.02em;margin:6px 0 6px;font-weight:600}p.sub{color:var(--ink-3);font-size:13.5px;margin:0 0 20px}
label{display:block;font-size:13px;font-weight:600;margin:0 0 6px}
input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 13px;font:inherit;margin-bottom:14px}
input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(79,179,163,.18)}
button{width:100%;border:0;border-radius:10px;background:var(--ink);color:#fff;padding:13px;font:inherit;font-weight:600;cursor:pointer}
button:hover:not(:disabled){background:#1a2228}button:disabled{opacity:.5;cursor:not-allowed}
.status{display:none;margin-top:14px;padding:11px 13px;border-radius:10px;font-size:13.5px}
.status.error{display:block;background:#FCEBEA;border:1px solid #F1C9C6;color:#8A2C25}
</style>
</head>
<body>
<div class="railbar" aria-hidden="true"><span class="a"></span><span class="b"></span><span class="c"></span></div>
<div class="mid">
  <div class="card">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 34 34" aria-hidden="true"><rect x="7" y="16" width="4.6" height="12" rx="2.3" fill="#4FB3A3"/><circle cx="9.3" cy="16" r="2.7" fill="#4FB3A3"/><rect x="14.7" y="11" width="4.6" height="17" rx="2.3" fill="#86B5A6"/><circle cx="17" cy="11" r="2.7" fill="#86B5A6"/><rect x="22.4" y="6" width="4.6" height="22" rx="2.3" fill="#CBA968"/><circle cx="24.7" cy="6" r="2.7" fill="#CBA968"/></svg>
      <div><b>VitaBahn</b><small>Investor Console</small></div>
    </div>
    <span class="pill">Internal — founder / Level 0</span>
    <h1>Console login</h1>
    <p class="sub">Restricted to founders, admins and counsel. All access is logged.</p>
    <form id="loginForm" data-endpoint="/api/auth/admin-login" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button id="submitBtn" type="submit">Sign in</button>
      <div id="status" class="status" role="alert" aria-live="polite"></div>
    </form>
  </div>
</div>
<script src="/assets/login.js"></script>
</body>
</html>
