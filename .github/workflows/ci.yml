name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Syntax-check JavaScript
        run: |
          node --check api/lead.js
          node --check app.js
          node --check middleware.js

      - name: Validate vercel.json
        run: node -e "JSON.parse(require('node:fs').readFileSync('vercel.json', 'utf8'))"

      - name: Check shell script syntax
        run: bash -n verify-live.sh
